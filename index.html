<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обрезка рингтонов для iPhone</title>
    <!-- Используем стабильную версию библиотеки MP3 -->
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <input type="file" id="audioFile" class="file-input" accept="audio/*">

    <div id="controls" class="controls">
        <audio id="audioPlayer" controls style="width: 100%; margin-bottom: 15px;"></audio>
        
        <div class="range-group">
            <label>Начало рингтона: <span id="startVal" class="time-display">0.0</span> сек</label>
            <input type="range" id="startTime" min="0" value="0" step="0.1">
            <small style="color: #666; display: block; margin-top: 8px;">Длина будет ровно 30 секунд (или до конца песни).</small>
        </div>

        <div id="status"></div>
        <button id="cutBtn">Скачать .MP3 (макс. 30 сек)</button>
    </div>
</div>

<script>
    let audioBuffer = null;
    let audioCtx = null;
    
    const fileInput = document.getElementById('audioFile');
    const controls = document.getElementById('controls');
    const audioPlayer = document.getElementById('audioPlayer');
    const startTimeInput = document.getElementById('startTime');
    const startVal = document.getElementById('startVal');
    const cutBtn = document.getElementById('cutBtn');
    const statusDiv = document.getElementById('status');

    let maxCutDuration = 30.0;

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files;
        if (!file) return;

        // Создаем аудиоконтекст с принудительной частотой 44100 Гц для совместимости с lamejs
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        }

        controls.style.display = 'block';
        statusDiv.textContent = ">> ЧТЕНИЕ И СБОРКА ПОТОКА... ПОДОЖДИТЕ.";
        cutBtn.disabled = true;

        audioPlayer.src = URL.createObjectURL(file);

        const reader = new FileReader();
        reader.onload = function(evt) {
            const arrayBuffer = evt.target.result;
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            audioCtx.decodeAudioData(arrayBuffer, function(decodedData) {
                audioBuffer = decodedData;
                startTimeInput.max = Math.max(0, audioBuffer.duration - 1).toString();
                startTimeInput.value = "0";
                
                updateTimeline();
                statusDiv.textContent = ">> ТРЕК ЗАГРУЖЕН В СЕТЬ WIRED. ВЫБЕРИТЕ СТАРТ.";
                cutBtn.disabled = false;
            }, function(err) {
                statusDiv.textContent = ">> ОШИБКА ДЕКОДИРОВАНИЯ: НЕПОДДЕРЖИВАЕМЫЙ ФОРМАТ.";
                console.error(err);
            });
        };
        reader.readAsArrayBuffer(file);
    });

    function updateTimeline() {
        const start = parseFloat(startTimeInput.value);
        startVal.textContent = start.toFixed(1) + " сек";
        audioPlayer.currentTime = start;
    }

    startTimeInput.addEventListener('input', updateTimeline);

    audioPlayer.addEventListener('timeupdate', function() {
        const start = parseFloat(startTimeInput.value);
        const end = start + maxCutDuration;

        if (audioPlayer.currentTime < start) {
            audioPlayer.currentTime = start;
        }

        if (audioPlayer.currentTime >= end) {
            audioPlayer.pause();
            audioPlayer.currentTime = start;
        }
    });

    cutBtn.addEventListener('click', async function() {
        if (!audioBuffer) return;

        audioPlayer.pause();
        cutBtn.disabled = true;
        statusDiv.textContent = ">> КОДИРОВАНИЕ ПАКЕТОВ MP3... ПРОЦЕСС ИДЕТ.";

        await new Promise(resolve => setTimeout(resolve, 100));

        try {
            const start = parseFloat(startTimeInput.value);
            const end = Math.min(start + maxCutDuration, audioBuffer.duration);
            
            // Фиксируем частоту для lamejs на 44100 Гц
            const targetSampleRate = 44100;
            
            // Получаем точные индексы сэмплов исходного файла
            const startSample = Math.floor(start * audioBuffer.sampleRate);
            const endSample = Math.floor(end * audioBuffer.sampleRate);
            
            // Создаем временный чистый буфер под 44100 Гц нужной длины
            const durationToCut = end - start;
            const outputFrameCount = Math.floor(durationToCut * targetSampleRate);
            
            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(
                2, 
                outputFrameCount, 
                targetSampleRate
            );
            
            // Вырезаем кусок аудио
            const bufferSource = offlineCtx.createBufferSource();
            bufferSource.buffer = audioBuffer;
            bufferSource.connect(offlineCtx.destination);
            
            // Запускаем воспроизведение строго с нужного момента
            bufferSource.start(0, start, durationToCut);
            
            // Дожидаемся рендеринга в формат 44100 Гц
            const renderedBuffer = await offlineCtx.startRendering();

            const leftChannel = renderedBuffer.getChannelData(0);
            let rightChannel = renderedBuffer.numberOfChannels > 1 ? renderedBuffer.getChannelData(1) : leftChannel;
            const finalFrameCount = renderedBuffer.length;

            // Настраиваем энкодер
            const mp3encoder = new lamejs.Mp3Encoder(2, targetSampleRate, 128);
            const mp3Data = [];

            const leftInt16 = new Int16Array(finalFrameCount);
            const rightInt16 = new Int16Array(finalFrameCount);

            // Безопасное конвертирование данных
            for (let i = 0; i < finalFrameCount; i++) {
                let leftSample = leftChannel[i];
                let rightSample = rightChannel[i];

                leftInt16[i] = leftSample < 0 ? leftSample * 0x8000 : leftSample * 0x7FFF;
                rightInt16[i] = rightSample < 0 ? rightSample * 0x8000 : rightSample * 0x7FFF;
            }

            const sampleBlockSize = 1152;
            for (let i = 0; i < finalFrameCount; i += sampleBlockSize) {
                const leftChunk = leftInt16.subarray(i, i + sampleBlockSize);
                const rightChunk = rightInt16.subarray(i, i + sampleBlockSize);
                const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
                if (mp3buf.length > 0) {
                    mp3Data.push(mp3buf);
                }
            }

            const mp3buf = mp3encoder.flush();
            if (mp3buf.length > 0) {
                mp3Data.push(mp3buf);
            }

            const blob = new Blob(mp3Data, { type: 'audio/mp3' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ringtone_${start.toFixed(0)}s.mp3`;
            a.click();

            statusDiv.textContent = ">> КОМПИЛЯЦИЯ ЗАВЕРШЕНА. РИНГТОН СКАЧАН.";
        } catch (error) {
            statusDiv.textContent = ">> СБОЙ СИСТЕМЫ ПРИ СЖАТИИ.";
            console.error(error);
        } finally {
            cutBtn.disabled = false;
        }
    });
</script>

</body>
</html>
