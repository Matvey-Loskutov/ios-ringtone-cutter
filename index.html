<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Рингтон Клипер</title>
    <!-- Подключаем библиотеку lamejs для кодирования MP3 прямо в браузере -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; color: #1d1d1f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 20px; }
        .file-input { margin-bottom: 20px; width: 100%; }
        .controls { display: none; margin-top: 20px; }
        .range-group { margin: 20px 0; text-align: left; }
        label { font-size: 14px; color: #86868b; display: block; margin-bottom: 8px; font-weight: 500; }
        input[type="range"] { width: 100%; margin-bottom: 5px; cursor: pointer; }
        .time-display { font-weight: bold; color: #0071e3; font-size: 16px; }
        .info-text { font-size: 13px; color: #86868b; margin-top: 5px; }
        button { background: #34c759; color: white; border: none; padding: 14px 24px; font-size: 16px; border-radius: 980px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: 600; transition: background 0.2s; }
        button:hover { background: #2cd054; }
        button:disabled { background: #999; cursor: not-allowed; }
        #status { font-size: 14px; color: #0071e3; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1>Создать MP3 рингтон 🎵</h1>
    <input type="file" id="audioFile" class="file-input" accept="audio/*">

    <div id="controls" class="controls">
        <audio id="audioPlayer" controls style="width: 100%; margin-bottom: 15px;"></audio>
        
        <div class="range-group">
            <label>Начало рингтона: <span id="startVal" class="time-display">0.0</span> сек</label>
            <input type="range" id="startTime" min="0" value="0" step="0.1">
            <div class="info-text">Длина рингтона будет ровно 30 секунд (или до конца трека)</div>
        </div>

        <div id="status"></div>
        <button id="cutBtn">Скачать .MP3 (макс. 30 сек)</button>
    </div>
</div>

<script>
    let audioBuffer = null;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const fileInput = document.getElementById('audioFile');
    const controls = document.getElementById('controls');
    const audioPlayer = document.getElementById('audioPlayer');
    const startTimeInput = document.getElementById('startTime');
    const startVal = document.getElementById('startVal');
    const cutBtn = document.getElementById('cutBtn');
    const statusDiv = document.getElementById('status');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusDiv.textContent = "Загрузка и обработка трека...";
        cutBtn.disabled = true;

        audioPlayer.src = URL.createObjectURL(file);
        controls.style.display = 'block';

        try {
            const arrayBuffer = await file.arrayBuffer();
            audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            // Настраиваем ползунок старта под длину трека
            startTimeInput.max = Math.max(0, audioBuffer.duration - 1);
            startTimeInput.value = 0;
            
            updateLabels();
            statusDiv.textContent = "";
            cutBtn.disabled = false;
        } catch (err) {
            statusDiv.textContent = "Ошибка при чтении аудиофайла.";
            console.error(err);
        }
    });

    function updateLabels() {
        const start = parseFloat(startTimeInput.value);
        startVal.textContent = start.toFixed(1);
    }

    startTimeInput.addEventListener('input', updateLabels);

    // При изменении ползунка перемещаем воспроизведение в плеере для удобства
    startTimeInput.addEventListener('change', () => {
        audioPlayer.currentTime = parseFloat(startTimeInput.value);
    });

    cutBtn.addEventListener('click', async () => {
        if (!audioBuffer) return;

        cutBtn.disabled = true;
        statusDiv.textContent = "Кодирование в MP3...";

        // Даем браузеру время обновить интерфейс перед тяжелым процессом
        await new Promise(resolve => setTimeout(resolve, 50));

        const start = parseFloat(startTimeInput.value);
        const maxDuration = 30; // Лимит 30 секунд
        const end = Math.min(start + maxDuration, audioBuffer.duration);
        
        const sampleRate = audioBuffer.sampleRate;
        const startSample = Math.floor(start * sampleRate);
        const endSample = Math.floor(end * sampleRate);
        const frameCount = endSample - startSample;

        // Берем моно или стерео (обычно левый канал 0)
        const leftChannel = audioBuffer.getChannelData(0);
        let rightChannel = audioBuffer.numberOfChannels > 1 ? audioBuffer.getChannelData(1) : leftChannel;

        // Настройка lamejs
        // Поддерживаемые lamejs частоты: 44100, 48000, 32000, 24000, 22050, 16000
        // Если у трека нестандартный sampleRate, принудительно ставим 44100
        let targetSampleRate = sampleRate;
        if (![44100, 48000, 32000, 24000, 22050, 16000].includes(sampleRate)) {
            targetSampleRate = 44100; 
        }

        const mp3encoder = new lamejs.Mp3Encoder(2, targetSampleRate, 128); // 2 канала, битрейт 128kbps
        const mp3Data = [];

        // Конвертируем Float32 в Int16 PCM для lamejs
        const leftInt16 = new Int16Array(frameCount);
        const rightInt16 = new Int16Array(frameCount);

        for (let i = 0; i < frameCount; i++) {
            let leftSample = leftChannel[startSample + i];
            let rightSample = rightChannel[startSample + i];

            // Загоняем в рамки [-1, 1] и переводим в Int16
            leftInt16[i] = leftSample < 0 ? leftSample * 0x8000 : leftSample * 0x7FFF;
            rightInt16[i] = rightSample < 0 ? rightSample * 0x8000 : rightSample * 0x7FFF;
        }

        // Кодируем пачками по 1152 сэмпла (стандарт для MP3)
        const sampleBlockSize = 1152;
        for (let i = 0; i < frameCount; i += sampleBlockSize) {
            const leftChunk = leftInt16.subarray(i, i + sampleBlockSize);
            const rightChunk = rightInt16.subarray(i, i + sampleBlockSize);
            const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
            if (mp3buf.length > 0) {
                mp3Data.push(mp3buf);
            }
        }

        // Финализируем файл
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) {
            mp3Data.push(mp3buf);
        }

        // Скачивание готового MP3
        const blob = new Blob(mp3Data, { type: 'audio/mp3' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ringtone_${start.toFixed(0)}s.mp3`;
        a.click();

        statusDiv.textContent = "Готово! Файл скачан.";
        cutBtn.disabled = false;
    });
</script>

</body>
</html>
