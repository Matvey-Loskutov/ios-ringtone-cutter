<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рингтон Мастер для iPhone</title>
    <!-- Подключаем внешние стили -->
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем библиотеку MP3 прямо перед нашим скриптом -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

<div class="card">
    <h1>Рингтон для iPhone</h1>
    <div class="subtitle">Обрежьте любимый трек до 30 секунд в MP3</div>

    <!-- Загрузка файла -->
    <div id="uploadContainer" class="file-upload">
        <input type="file" id="audioFile" accept="audio/*">
        <div class="file-upload-label">
            <div class="upload-icon">🎵</div>
            <div class="upload-text">Выберите или перетащите трек</div>
        </div>
    </div>

    <!-- Рабочая область после загрузки -->
    <div id="workspace" class="workspace">
        <audio id="audioPlayer" style="display:none;"></audio>

        <!-- Виджет плеера -->
        <div class="audio-widget">
            <div class="player-ui">
                <button class="play-btn" id="playBtn">▶</button>
                <div class="track-info">
                    <div class="track-name" id="fileName">Название трека</div>
                    <div class="playback-duration" id="playTime">Прослушано: 0.0 из 30.0 сек</div>
                </div>
            </div>
        </div>

        <!-- Управление точкой старта -->
        <div class="control-group">
            <div class="control-header">
                <span class="control-title">Начало рингтона</span>
                <span class="control-value" id="startVal">0.0 сек</span>
            </div>
            <input type="range" id="startTime" min="0" value="0" step="0.1">
        </div>

        <div class="hint-box">
            Плеер автоматически начнет играть музыку с этой секунды. Длина рингтона составит ровно 30 секунд (или до самого конца трека).
        </div>

        <div id="status"></div>
        <button id="cutBtn" class="action-btn">Создать рингтон</button>
    </div>
</div>

<!-- Подключаем внешнюю логику (в самом конце body) -->
<script src="script.js"></script>
</body>
</html>
